<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="flexbox1.css">
</head>
<body>
        <img src="https://developer.mozilla.org/en-US/docs/Learn_web_development/Core/CSS_layout/Flexbox/flex_terms.png">
        <br>
        <img src="https://miro.medium.com/v2/resize:fit:1100/format:webp/0*YeaUsQyhXSL1TCTH.png">
        <br>
        <!-- Flex row -->
        <div class="container1" >
            <div class="sbox" id="box1">Box1</div>
            <div class="sbox" id="box2">Box2</div>
            <div class="sbox" id="box3">Box3</div>
            <div class="sbox" id="box4">Box4</div>
            <div class="sbox" id="box5">Box5</div>
        </div>

        <!-- Flex row-reverse -->
        <div class="container2" >
            <div class="sbox1" id="box1">Box1</div>
            <div class="sbox1" id="box2">Box2</div>
            <div class="sbox1" id="box3">Box3</div>
            <div class="sbox1" id="box4">Box4</div>
            <div class="sbox1" id="box5">Box5</div>
        </div>

        <!-- Flex column -->
        <div class="container3" >
            <div class="sbox2" id="box1">Box1</div>
            <div class="sbox2" id="box2">Box2</div>
            <div class="sbox2" id="box3">Box3</div>
            <div class="sbox2" id="box4">Box4</div>
            <div class="sbox2" id="box5">Box5</div>
        </div>

        <!-- Flex column-reverse  -->
        <div class="container4" >
            <div class="sbox3" id="box1">Box1</div>
            <div class="sbox3" id="box2">Box2</div>
            <div class="sbox3" id="box3">Box3</div>
            <div class="sbox3" id="box4">Box4</div>
            <div class="sbox3" id="box5">Box5</div>
        </div>

        <!-- Flex justify-content(flex)  -->
        <div class="container5" >
            <div class="sbox4" id="box1">Box1</div>
            <div class="sbox4" id="box2">Box2</div>
            <div class="sbox4" id="box3">Box3</div>
            <div class="sbox4" id="box4">Box4</div>
            <div class="sbox4" id="box5">Box5</div>
        </div>
</body>
</html>
